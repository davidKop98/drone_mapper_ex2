simulation_config:
  map_filename: "map/scenario_house.npy"
  map_resolution_cm: 10   # input file map voxel size (width/height/depth)
  initial_drone_position:     # relative to the offset below; real = position + offset
    x_cm: 150
    y_cm: 200
    height_cm: 175            # real z = 175 + 150 = 325 -> floor-1 interior (above the 150cm ground)
  initial_angle_deg: 0    # 0=east, 90=south, 180=west, 270=north
  map_axes_offset: # Turns (0,0,0)-> (x_offset,y_offset,height_offset)
    x_offset: 0
    y_offset: 0
    height_offset : 150

